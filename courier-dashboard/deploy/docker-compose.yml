# Инфраструктура проекта. Поднять: docker compose -f deploy/docker-compose.yml up -d
# На этапе каркаса backend работает и без этого (хранилище в памяти). Это задел на сервер.
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: couriers
      POSTGRES_USER: couriers
      POSTGRES_PASSWORD: change_me   # заменить, в git не коммитим реальный
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  # Маршрутизатор. Требует предварительно собранные тайлы города (дамп OSM).
  # См. docs/03. Образ и монтирование тайлов настроим на Этапе 3.
  valhalla:
    image: ghcr.io/valhalla/valhalla:latest
    ports: ["8002:8002"]
    volumes:
      - ./valhalla_tiles:/custom_files
    profiles: ["routing"]   # включается отдельно: docker compose --profile routing up

volumes:
  pgdata:
